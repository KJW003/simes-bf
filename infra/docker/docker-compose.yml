version: "3.9"

networks:
  edge:
    driver: bridge
  internal:
    driver: bridge

volumes:
  core_db_data:
  telemetry_db_data:
  redis_data:
  minio_data:

services:
  # ──────────────────────────────────────────────────────────
  # Databases
  # ──────────────────────────────────────────────────────────
  core-db:
    image: postgres:16
    container_name: simes-core-db
    environment:
      POSTGRES_DB: ${CORE_DB_NAME}
      POSTGRES_USER: ${CORE_DB_USER}
      POSTGRES_PASSWORD: ${CORE_DB_PASSWORD}
      TZ: ${TZ}
    volumes:
      - core_db_data:/var/lib/postgresql/data
      - ../db/schema-core.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CORE_DB_USER} -d ${CORE_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10

  telemetry-db:
    image: timescale/timescaledb:latest-pg16
    container_name: simes-telemetry-db
    environment:
      POSTGRES_DB: ${TELEMETRY_DB_NAME}
      POSTGRES_USER: ${TELEMETRY_DB_USER}
      POSTGRES_PASSWORD: ${TELEMETRY_DB_PASSWORD}
      TZ: ${TZ}
    volumes:
      - telemetry_db_data:/var/lib/postgresql/data
      - ../db/schema-telemetry.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TELEMETRY_DB_USER} -d ${TELEMETRY_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ──────────────────────────────────────────────────────────
  # Infrastructure
  # ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: simes-redis
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: simes-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      TZ: ${TZ}
    volumes:
      - minio_data:/data
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:9000/minio/health/live >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ──────────────────────────────────────────────────────────
  # Reverse proxy
  # ──────────────────────────────────────────────────────────
  traefik:
    image: traefik:v2.11
    container_name: simes-traefik
    command:
      - --api.dashboard=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - edge
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # Frontend (React/Vite + Nginx)
  # ──────────────────────────────────────────────────────────
  frontend-web:
    build:
      context: ../../apps/frontend-web
      args:
        VITE_API_URL: /api
    container_name: simes-frontend-web
    labels:
      - traefik.enable=true
      - traefik.docker.network=edge
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - traefik.http.routers.frontend.entrypoints=web
      - traefik.http.routers.frontend.priority=1
      - traefik.http.services.frontend.loadbalancer.server.port=80
    networks:
      - edge
      - internal
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # Backend API
  # ──────────────────────────────────────────────────────────
  api-core:
    build: ../../apps/api-core
    container_name: simes-api-core
    environment:
      PORT: "3000"
      CORE_DB_URL: "postgres://${CORE_DB_USER}:${CORE_DB_PASSWORD}@core-db:5432/${CORE_DB_NAME}"
      TELEMETRY_DB_URL: "postgres://${TELEMETRY_DB_USER}:${TELEMETRY_DB_PASSWORD}@telemetry-db:5432/${TELEMETRY_DB_NAME}"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379"
      TZ: ${TZ}
    depends_on:
      core-db:
        condition: service_healthy
      telemetry-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.docker.network=edge
      - "traefik.http.routers.api.rule=PathPrefix(`/api`)"
      - traefik.http.routers.api.entrypoints=web
      - traefik.http.routers.api.priority=100
      - traefik.http.middlewares.api-strip.stripprefix.prefixes=/api
      - traefik.http.routers.api.middlewares=api-strip
      - traefik.http.services.api.loadbalancer.server.port=3000
    networks:
      - edge
      - internal
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # Workers (BullMQ consumers)
  # ──────────────────────────────────────────────────────────
  worker-jobs:
    build: ../../apps/worker-jobs
    container_name: simes-worker-jobs
    environment:
      CORE_DB_URL: "postgres://${CORE_DB_USER}:${CORE_DB_PASSWORD}@core-db:5432/${CORE_DB_NAME}"
      TELEMETRY_DB_URL: "postgres://${TELEMETRY_DB_USER}:${TELEMETRY_DB_PASSWORD}@telemetry-db:5432/${TELEMETRY_DB_NAME}"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379"
      TZ: ${TZ}
    depends_on:
      core-db:
        condition: service_healthy
      telemetry-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

