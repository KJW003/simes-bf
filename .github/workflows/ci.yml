name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Frontend lint + typecheck + build ─────────────────────
  frontend:
    name: Frontend (lint, typecheck, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/frontend-web/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx vite build
      - run: npx vitest run --passWithNoTests

  # ── API Core tests ───────────────────────────────────────
  api-core:
    name: API Core (lint, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api-core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/api-core/package-lock.json
      - run: npm ci
      - run: npm test

  # ── Ingestion Service tests ─────────────────────────────
  ingestion:
    name: Ingestion Service (lint, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ingestion-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/ingestion-service/package-lock.json
      - run: npm ci
      - run: npm test

  # ── Docker build validation ─────────────────────────────
  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [frontend, api-core, ingestion]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t simes-api-core ./apps/api-core
      - run: docker build -t simes-ingestion ./apps/ingestion-service
      - run: docker build -t simes-worker ./apps/worker-jobs
      - run: docker build -t simes-frontend ./apps/frontend-web
