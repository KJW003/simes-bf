server {
  listen 80;
  server_name _;

  # Docker embedded DNS – resolve service names at request time, not startup
  resolver 127.0.0.11 valid=10s ipv6=off;

  # ── API reverse proxy ──────────────────────────────────────
  location /api/ {
    set $upstream_api http://api-core:3000;
    rewrite ^/api/(.*) /$1 break;
    proxy_pass         $upstream_api;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;
  }

  # ── Ingestion reverse proxy ────────────────────────────────
  location /ingest/ {
    set $upstream_ingest http://ingestion-service:3001;
    rewrite ^/ingest/(.*) /$1 break;
    proxy_pass         $upstream_ingest;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;
  }

  # ── Static assets (long cache) ─────────────────────────────
  location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|webp|avif|woff|woff2|ttf|otf|eot|map)$ {
    root /usr/share/nginx/html;
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
    try_files $uri =404;
  }

  # ── SPA fallback ───────────────────────────────────────────
  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
  }
}
