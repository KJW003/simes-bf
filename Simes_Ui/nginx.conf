server {
  listen 80;
  server_name _;

  # ── API reverse proxy ─────────────────────────────────
  # In Docker the api-core container is reachable at http://api-core:3000
  # Standalone: change to your backend host
  location /api/ {
    proxy_pass http://api-core:3000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # ── Frontend SPA ──────────────────────────────────────
  location = /testUi {
    return 301 /testUi/;
  }

  location /testUi/ {
    alias /usr/share/nginx/html/testUi/;
    try_files $uri $uri/ /testUi/index.html;
  }

  location ~* ^/testUi/.*\.(?:js|css|png|jpg|jpeg|gif|svg|ico|webp|avif|woff|woff2|ttf|otf|eot|map)$ {
    root /usr/share/nginx/html;
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
    try_files $uri =404;
  }

  location / {
    return 301 /testUi/;
  }
}
